name: CodeQL

# Static analysis using GitHub's CodeQL engine. Runs on every push and PR to
# main, plus a weekly schedule so newly-added queries are applied against
# existing code without needing a code change to trigger them.
#
# This workflow can be replaced by "CodeQL default setup" in repo Settings →
# Code security → Code scanning at any time; both produce equivalent results.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays at 06:17 UTC. Off-peak; minute is non-zero to avoid the
    # hourly thundering-herd on shared runners.
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.language == 'csharp' && 'windows-latest' || 'ubuntu-latest' }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [csharp, javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The C# matrix leg needs both .NET SDKs so the WPF app (net10.0-windows)
      # and the scanner (net8.0) both build under CodeQL's tracer.
      - name: Setup .NET (C# only)
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      # autobuild handles the C# build via dotnet build. JavaScript needs no
      # build step.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
