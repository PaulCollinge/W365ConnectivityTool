<title>Mockup — Network Path panel (L-TCP-10)</title>
<link rel="stylesheet" href="css/styles.css?v=279">
<style>
  body { background: var(--bg-default, #0d1117); padding: 32px; }
  .mock-wrap { max-width: 720px; margin: 0 auto; }
  .mock-note { color: var(--text-muted); font-family: var(--font); font-size: var(--text-xs); margin: 0 0 16px; }
  /* Reuse the real map container chrome so it looks in-context */

<body>
<div class="mock-wrap">

    <div id="map-traceroute" class="map-traceroute">
      <button type="button" class="map-trace-toggle" id="map-trace-toggle" aria-expanded="true" aria-controls="map-trace-body" onclick="toggleMapTraceroute()">
        <span class="map-trace-chevron" id="map-trace-chevron" aria-hidden="true">▾</span>
        <span class="map-trace-title">Network Path</span>
        <span class="map-trace-sub" id="map-trace-summary"></span>
      </button>
      <div class="map-trace-body" id="map-trace-body" role="region" aria-label="Per-hop network path traces"></div>
    </div>
  </div>
</div>

function setText(id,t){var el=document.getElementById(id);if(el)el.textContent=t;}
</script>
